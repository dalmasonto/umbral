[package]
name = "plugin_directory"
version = "0.1.0"
edition = "2024"

[dependencies]
umbra = { path = "/home/dalmas/E/projects/umbra/crates/umbra" }
umbra-auth = { path = "/home/dalmas/E/projects/umbra/plugins/umbra-auth" }
# Live note feed: broadcast a posted note to the plugin's SSE watchers.
umbra-realtime = { path = "/home/dalmas/E/projects/umbra/plugins/umbra-realtime" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", default-features = false, features = ["macros", "runtime-tokio", "chrono", "uuid", "json"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["serde"] }

# Used by the seed-on-ready logging in src/lib.rs.
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
tracing = "0.1"
