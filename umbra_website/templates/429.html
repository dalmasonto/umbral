{% extends "base.html" %}
{% block title %}{{ status_text }}{% endblock %}
{% block content %}
  <div class="text-center py-16">
    <h1 class="text-6xl font-bold text-gray-300 mb-4">{{ status }}</h1>
    <p class="text-xl text-gray-600 mb-2">{{ status_text }}</p>
    <p class="text-gray-400 mb-8">{{ message }}</p>
    <button type="button" onclick="history.back()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Go back</button>
  </div>
{% endblock %}
