<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Umbra{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}Umbra is a plugin-first Rust web framework for complete applications, admin-managed content, forms, migrations, REST APIs, and swappable batteries.{% endblock %}">
  <link rel="stylesheet" href="/static/css/umbra.css">
  {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen bg-[oklch(0.972_0.009_230)] text-[oklch(0.2_0.025_245)] antialiased">
  <div class="min-h-screen">
    <header class="sticky top-0 z-50 border-b border-[oklch(0.82_0.02_235)] bg-[oklch(0.972_0.009_230)]">
      <nav class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-3 sm:px-6 lg:px-8" aria-label="Main navigation">
        <a href="/" class="inline-flex min-w-0 items-center gap-3 no-underline">
          <span class="grid h-8 w-8 shrink-0 place-items-center rounded bg-[oklch(0.22_0.04_245)] text-sm font-black text-[oklch(0.94_0.06_92)]">U</span>
          <span class="min-w-0 leading-tight">
            <span class="block text-sm font-black">Umbra</span>
            <span class="block text-xs font-semibold text-[oklch(0.45_0.03_245)]">Rust web framework</span>
          </span>
        </a>

        <div class="hidden items-center gap-1 md:flex">
          <a href="#framework" class="rounded px-2.5 py-2 text-sm font-semibold text-[oklch(0.38_0.03_245)] hover:bg-[oklch(0.93_0.014_230)] hover:text-[oklch(0.18_0.03_245)]">Framework</a>
          <a href="#plugins" class="rounded px-2.5 py-2 text-sm font-semibold text-[oklch(0.38_0.03_245)] hover:bg-[oklch(0.93_0.014_230)] hover:text-[oklch(0.18_0.03_245)]">Plugins</a>
          <a href="#workflow" class="rounded px-2.5 py-2 text-sm font-semibold text-[oklch(0.38_0.03_245)] hover:bg-[oklch(0.93_0.014_230)] hover:text-[oklch(0.18_0.03_245)]">Workflow</a>
          <a href="#site" class="rounded px-2.5 py-2 text-sm font-semibold text-[oklch(0.38_0.03_245)] hover:bg-[oklch(0.93_0.014_230)] hover:text-[oklch(0.18_0.03_245)]">This site</a>
          <a href="/admin/" class="rounded px-2.5 py-2 text-sm font-semibold text-[oklch(0.38_0.03_245)] hover:bg-[oklch(0.93_0.014_230)] hover:text-[oklch(0.18_0.03_245)]">Admin</a>
        </div>

        <a href="/openapi/" class="inline-flex shrink-0 rounded border border-[oklch(0.74_0.03_235)] bg-[oklch(0.99_0.006_230)] px-3 py-2 text-sm font-black text-[oklch(0.23_0.035_245)] shadow-sm hover:border-[oklch(0.58_0.06_220)]">
          OpenAPI
        </a>
      </nav>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-[oklch(0.82_0.02_235)] bg-[oklch(0.94_0.012_230)]">
      <div class="mx-auto flex max-w-7xl flex-col gap-4 px-4 py-7 text-sm text-[oklch(0.43_0.03_245)] sm:flex-row sm:items-center sm:justify-between sm:px-6 lg:px-8">
        <p><strong class="text-[oklch(0.2_0.025_245)]">Umbra</strong> is being documented by a site built with Umbra.</p>
        <div class="flex flex-wrap gap-4 font-semibold">
          <a href="#plugins" class="hover:text-[oklch(0.22_0.04_245)]">Plugins</a>
          <a href="#workflow" class="hover:text-[oklch(0.22_0.04_245)]">Workflow</a>
          <a href="/dashboard" class="hover:text-[oklch(0.22_0.04_245)]">Dashboard</a>
          <a href="/admin/" class="hover:text-[oklch(0.22_0.04_245)]">Admin</a>
        </div>
      </div>
    </footer>
  </div>
</body>
</html>
