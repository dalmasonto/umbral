<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found</title>
  <style>
    /* Minimal reset so the page looks acceptable without Tailwind loaded. */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f9fafb; color: #111827; }
    a { color: #4f46e5; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-50">
  <div class="text-center px-6 py-16 max-w-md mx-auto">
    <p class="text-8xl font-extrabold text-indigo-600 tracking-tight">404</p>
    <h1 class="mt-4 text-2xl font-bold text-gray-900">Page not found</h1>
    <p class="mt-3 text-base text-gray-500">
      The page
      {% if path %}<code class="px-1 py-0.5 bg-gray-100 rounded text-sm font-mono">{{ path }}</code>{% endif %}
      doesn't exist or has been moved.
    </p>
    <div class="mt-8">
      <a href="/" class="inline-block rounded-md bg-indigo-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">
        Go home
      </a>
    </div>
  </div>
</body>
</html>
