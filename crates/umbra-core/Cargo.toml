[package]
name = "umbra-core"
description = "umbra internals: ORM, migrations, routing, DB backends, the Plugin trait. Do not depend on this directly; use the `umbra` facade."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
axum = "0.8"
chrono = { version = "0.4", features = ["serde"] }
figment = { version = "0.10", features = ["env", "toml"] }
sea-query = "0.32"
sea-query-binder = { version = "0.7", features = ["sqlx-sqlite", "with-chrono"] }
serde = { version = "1", features = ["derive"] }
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio", "chrono"] }
tokio = "1"
tracing = "0.1"

[dev-dependencies]
# figment::Jail (for env-var and toml file sandboxing in tests) lives behind
# the "test" feature.
figment = { version = "0.10", features = ["test"] }
# tokio macros enable #[tokio::test] for async tests; rt is the runtime.
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread"] }
