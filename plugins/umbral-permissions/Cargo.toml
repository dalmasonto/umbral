[package]
name = "umbral-permissions"
description = "Role-based access control for umbral: ContentType, Permission, Group, user-group and user-permission M2M tables, plus the has_perm / user_perms query layer."
workspace = "../.."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
umbral = { path = "../../crates/umbral", version = "0.0.1" }
# permission_required uses umbral-auth's session resolution. The arrow
# direction (permissions → auth) is correct: permissions sit *above* auth
# in the layering — you need to know who the user is before you can
# check what they're allowed to do.
umbral-auth = { path = "../umbral-auth", version = "0.0.1" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio"] }
tracing = "0.1"
# rt-multi-thread for `tokio::task::block_in_place` in `on_ready`.
tokio = { version = "1", features = ["rt", "rt-multi-thread"] }
# axum + tower for the PermissionRequiredLayer Service impl.
axum = "0.8"
axum-core = "0.5"
http = "1"
tower = "0.5"
# Optional REST integration — see `src/rest.rs`. The `rest` feature
# turns on the adapter types (`WithPermissions`, `HasPermission`) that
# let `umbral-rest`'s viewset permission gates check `umbral-permissions`
# codenames. Off by default so REST-free apps don't pull in the
# umbral-rest dep just by depending on permissions.
umbral-rest = { path = "../umbral-rest", version = "0.0.1", optional = true }
async-trait = { version = "0.1", optional = true }

[features]
default = []
rest = ["dep:umbral-rest", "dep:async-trait"]

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "sync"] }
tempfile = "3"
