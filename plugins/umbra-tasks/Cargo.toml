[package]
name = "umbra-tasks"
description = "DB-backed background task queue for umbra. The Celery in Rust shape."
workspace = "../../crates"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
umbra = { path = "../../crates/umbra", version = "0.0.1" }
# Direct dep on the built-in admin: admin_model() returns an AdminModel for
# TaskRow so an app can register it (browse the queue + a retry action).
# Feature-gated so a tasks-only app (no admin) compiles without pulling the
# admin into its dependency graph.
umbra-admin = { path = "../umbra-admin", version = "0.0.1", optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
cron = "0.12"
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio", "chrono"] }
tokio = { version = "1", features = ["rt", "rt-multi-thread", "time", "sync", "macros"] }
tracing = "0.1"
clap = { version = "4" }
async-trait = "0.1"

[features]
default = ["admin"]
# Pull in umbra-admin so `admin_model()` is available. On by default since
# admin is a built-in; turn it off (`default-features = false`) for a slim
# tasks-only build that doesn't pull the admin into its dependency graph.
admin = ["dep:umbra-admin"]

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "sync", "time", "test-util"] }
tempfile = "3"
