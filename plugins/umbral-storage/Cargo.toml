[package]
name = "umbral-storage"
description = "Unified storage plugin for umbral: merges static-file serving (umbral-static) and media uploads (umbral-media) onto one Storage trait, with an optional S3 backend."
workspace = "../.."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[features]
default = []
# S3 (and S3-compatible: MinIO, R2) Storage backend used for BOTH the media
# ("default") and static ("staticfiles") storage instances. Pulls in
# `rust-s3` only when enabled, so a local-only app never compiles the AWS
# client. Off by default — matches umbral-static's old `s3` feature.
s3 = ["dep:rust-s3", "dep:futures-executor"]
# Built-in image processing (thumbnails / resize). Pulls in the `image` crate
# only when enabled, so an app with no user-uploaded images never compiles a
# codec. Off by default (gaps3 #50).
images = ["dep:image"]

[dependencies]
# Optional: only compiled with the `images` feature. Default features off — we
# want the common web codecs, not every format the crate can decode.
image = { version = "0.25", optional = true, default-features = false, features = ["png", "jpeg", "gif", "webp"] }
umbral = { path = "../../crates/umbral", version = "0.0.7" }
# Optional S3 backend (rust-s3). `blocking` so the synchronous collect path
# can upload without an async runtime; default features off to keep the dep
# lean. Only built under the `s3` feature.
rust-s3 = { version = "0.37", optional = true, default-features = false, features = ["blocking", "tokio-rustls-tls"] }
# `url()` is a SYNC trait method called from inside async request handlers, so
# it must NOT use rust-s3's `*_blocking` presign (which does `Runtime::new().
# block_on` and panics inside an existing tokio runtime). Instead we drive the
# async `presign_get` — pure local HMAC, no I/O — with `futures_executor::
# block_on`, which polls the already-ready future without spinning a runtime.
futures-executor = { version = "0.3", optional = true, default-features = false, features = ["std"] }
tower-http = { version = "0.6", features = ["fs", "set-header"] }
tower = { version = "0.5", default-features = false, features = ["util"] }
# `sync` for the Semaphore that bounds concurrent media processing (audit_2
# plugin-storage-tasks #4) so an upload burst can't fan out unbounded
# CPU/memory-heavy processing tasks.
tokio = { version = "1", features = ["fs", "io-util", "sync"] }
# tokio-util `io` gives StreamReader (stream -> AsyncRead, for streaming a
# body to disk) and ReaderStream (AsyncRead -> stream, for streaming a file
# off disk). futures-util provides the Stream combinators store_stream uses.
tokio-util = { version = "0.7", features = ["io"] }
futures-util = { version = "0.3", default-features = false, features = ["std"] }
bytes = "1"
axum = "0.8"
http = "1"
tracing = "0.1"
sha2 = "0.10"
percent-encoding = "2"
# Embedded-asset support: callers pass in a `&'static Dir<'static>`
# produced by `include_dir!()` and we serve files out of memory.
include_dir = { version = "0.7", default-features = false }
mime_guess = "2"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
serde = { version = "1", features = ["derive"] }
sqlx = { version = "0.8", default-features = false, features = ["sqlite", "runtime-tokio", "chrono"] }
uuid = { version = "1", features = ["v4", "serde"] }
# clap for the `collectstatic` management command — Plugin::commands()
# returns a Vec<Box<dyn PluginCommand>>, and each command exposes a
# clap::Command for arg parsing.
clap = "4"
# async-trait for the PluginCommand impl. The trait in `umbral::cli` is
# async, made object-safe via async-trait's Pin<Box<...>> desugaring.
async-trait = "0.1"

[dev-dependencies]
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "sync"] }
tempfile = "3"
include_dir = "0.7"
http-body-util = "0.1"
tower = { version = "0.5", features = ["util"] }
futures-util = { version = "0.3", default-features = false, features = ["std"] }
