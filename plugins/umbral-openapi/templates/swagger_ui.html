<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>umbral API docs</title>
  <!-- audit_2 plugin-observability #9: asset base is pinned to an exact version
       and configurable (OpenApiPlugin::swagger_asset_base) so it can be
       self-hosted. crossorigin + referrerpolicy limit what a third-party CDN
       sees and how errors are reported. -->
  <link rel="stylesheet" href="{ASSET_BASE}/swagger-ui.css"
        crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="{ASSET_BASE}/swagger-ui-bundle.js"
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script>
    window.onload = () => {
      window.ui = SwaggerUIBundle({ url: "{SPEC_URL}", dom_id: "#swagger-ui" });
    };
  </script>
</body>
</html>
