[package]
name = "umbral-analytics"
description = "Product-analytics event capture for umbral. PostHog backend with fire-and-forget capture, ambient client, and opt-in per-request middleware."
workspace = "../.."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
umbral = { path = "../../crates/umbral", version = "0.0.4" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "sync"] }
async-trait = "0.1"
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }
axum = "0.8"
# HTTP client for PostHog API calls. rustls avoids a system OpenSSL
# build dependency. json feature enables `.json()` request/response helpers.
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread"] }
serde_json = "1"
