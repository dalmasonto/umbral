[package]
name = "umbra-static"
description = "Static file serving plugin for umbra. Wraps tower-http's ServeDir."
workspace = "../../crates"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
umbra = { path = "../../crates/umbra", version = "0.0.1" }
tower-http = { version = "0.6", features = ["fs", "set-header"] }
tower = { version = "0.5", default-features = false, features = ["util"] }
http = "1"
tracing = "0.1"
# Embedded-asset support: callers pass in a `&'static Dir<'static>`
# produced by `include_dir!()` and we serve files out of memory. We
# only need the type — the macro that produces a `Dir` lives in the
# `include_dir_macros` crate which the caller pulls in themselves.
include_dir = { version = "0.7", default-features = false }
mime_guess = "2"
bytes = "1"
axum = "0.8"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "sync"] }
tempfile = "3"
include_dir = "0.7"
http-body-util = "0.1"
