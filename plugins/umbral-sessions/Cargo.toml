[package]
name = "umbral-sessions"
description = "Session storage + cookie helpers for umbral. DB-backed sessions linked to umbral-auth users."
workspace = "../.."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[features]
default = []
# Enable the Redis-backed session store (`RedisStore`). Requires a Redis server
# reachable at the configured URL. Adds the `redis` crate with tokio-comp (async
# connection manager support). Activate with `--features redis`.
redis = ["dep:redis"]

[dependencies]
umbral = { path = "../../crates/umbral", version = "0.0.9" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio", "chrono"] }
uuid = { version = "1", features = ["serde", "v4", "v7"] }
# Session tokens are SHA-256 hashed before DB storage so a DB leak
# (backup, SQLi, exposed dump) doesn't surrender live session tokens.
# The raw token only ever exists in the cookie and in the response
# from `create_session`; the column holds only the digest.
sha2 = "0.10"
# CookieStore (stateless, AEAD-encrypted session-in-cookie). XChaCha20Poly1305
# uses a 24-byte RANDOM nonce — no counter state to persist between requests,
# which is exactly what a stateless cookie store needs (a fresh nonce per save
# with no risk of reuse). The 32-byte key is derived from `secret_key` via
# SHA-256 (sha2, above).
chacha20poly1305 = "0.10"
# base64url-encode the `nonce || ciphertext` blob so it survives as a cookie
# value (cookies are ASCII; URL-safe alphabet avoids `+`/`/` quoting issues).
base64 = "0.22"
# OS CSPRNG for the per-save random nonce. Depended on directly (rather than
# via a transitive aead feature) so the nonce source is explicit and stable.
# 0.2 matches the version already in the tree via sqlx/uuid.
getrandom = "0.2"
# axum-core has the FromRequestParts trait we need for the User /
# OptionalUser extractors. The full axum facade comes through
# `umbral::web::*` already; we depend on axum-core directly so the
# trait impl writes cleanly without a transitive umbral-rest hop.
axum-core = "0.5"
async-trait = "0.1"
# `http` for the `Parts` type axum-core's FromRequestParts uses.
http = "1"
# axum proper for `middleware::from_fn` — the cleanest way to wire
# SessionLayer. The `Plugin::wrap_router` hook receives an
# `axum::Router`, and `Router::layer(middleware::from_fn(...))` is
# how axum-shaped middleware plugs in.
axum = "0.8"
# `tracing::warn!` in the login() helper when last_login update
# fails (the login itself still succeeded; we just log the secondary
# failure).
tracing = "0.1"
# `clearsessions` management command — Plugin::commands() contributes a
# clap subcommand; same pattern as umbral-auth's `createsuperuser`.
clap = "4"
# `tokio::task_local!` backs the request-scoped `RequestSession`
# (CURRENT_SESSION) that `session_layer` scopes around each handler. Only
# the `rt` feature is needed for the LocalKey/scope machinery.
tokio = { version = "1", features = ["rt"] }

# Optional Redis backend dep. Only compiled when the `redis` feature is
# enabled. Connection manager handles reconnect transparently and avoids
# the overhead of a new connection per command. Mirrors the exact setup in
# umbral-cache and umbral-realtime.
[dependencies.redis]
version = "0.27"
features = ["tokio-comp", "connection-manager"]
optional = true

[dev-dependencies]
# umbral-auth as a DEV-dep only: integration tests exercise the
# AuthUser-aware helpers (now living in umbral-auth) against the
# session primitives this crate owns. Dev-deps don't cycle at the
# build graph level — Cargo treats the test binary as a separate
# crate from the lib, so umbral-auth -> umbral-sessions (prod) +
# umbral-sessions -> umbral-auth (dev) is legal.
umbral-auth = { path = "../umbral-auth" }
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "sync"] }
tempfile = "3"
# The extractor + messages tests build synthetic axum requests via
# the `http` crate's Request builder and exercise the `FromRequestParts`
# impl directly (no full router needed).
axum-core = "0.5"
http = "1"
# The router-middleware test drives a real `axum::Router` via tower's
# `oneshot` to exercise `SessionsPlugin::wrap_router` + `session_layer`
# end-to-end.
axum = "0.8"
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"
