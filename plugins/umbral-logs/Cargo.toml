[package]
name = "umbral-logs"
description = "Request logging for umbral. A non-blocking capture layer records each HTTP request to a RequestLog model, browsable in the admin."
workspace = "../.."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
umbral = { path = "../../crates/umbral", version = "0.0.10" }
# Direct dep on the built-in admin: admin_model() returns an AdminModel for
# RequestLog so the app can register it. Feature-gated so a logs-only app
# (no admin) compiles without pulling the admin in.
umbral-admin = { path = "../umbral-admin", version = "0.0.10", optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio", "chrono"] }
tokio = { version = "1", features = ["rt", "rt-multi-thread"] }
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }
axum = "0.8"

# ── Observability stack (feature `tracing`) ──────────────────────────────────
# All optional. Without the `tracing` feature, umbral-logs compiles exactly as
# before (only the `tracing` *crate* facade above). The version set below is
# pinned deliberately: `tracing-opentelemetry 0.33` is the release that targets
# `opentelemetry 0.32` / `opentelemetry_sdk 0.32`, and `opentelemetry-otlp 0.32`
# matches the same core. Bump all four together — a mismatched pair fails to
# compile because the `SpanData` / `Tracer` types don't line up across versions.
# Non-optional: the `observability::init` helper always configures fmt/JSON
# logging from a `tracing_subscriber::registry()`, even in a base build. Only
# the OTLP span-export *layer* is gated behind `otel`.
tracing-subscriber = { version = "0.3", features = ["env-filter", "json", "fmt", "registry"] }
tracing-opentelemetry = { version = "0.33", optional = true }
opentelemetry = { version = "0.32", optional = true }
opentelemetry_sdk = { version = "0.32", optional = true, features = ["rt-tokio"] }
opentelemetry-otlp = { version = "0.32", optional = true, features = ["grpc-tonic", "trace"] }
# `trace` feature of tower-http gives TraceLayer (request span per HTTP call).
tower-http = { version = "0.6", optional = true, features = ["trace"] }

[features]
default = ["admin"]
# Pull in umbral-admin so `admin_model()` is available. On by default since
# admin is a built-in; turn it off (`default-features = false`) for a slim
# logs-only build.
admin = ["dep:umbral-admin"]
# Structured (JSON) logging init helper + OpenTelemetry OTLP trace export +
# per-request HTTP spans. Optional: a base build (no `otel` feature) does NOT
# pull the otel/tonic deps and the init helper degrades to plain fmt logs.
# Named `otel` (not `tracing`) because Cargo forbids a feature sharing the name
# of a non-optional dependency (`tracing` the crate is always present).
otel = [
    "dep:tracing-opentelemetry",
    "dep:opentelemetry",
    "dep:opentelemetry_sdk",
    "dep:opentelemetry-otlp",
    "dep:tower-http",
]

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread"] }
tempfile = "3"
tower = { version = "0.5", features = ["util"] }
axum = "0.8"
# In-memory OTLP span exporter for the span-export test (no live collector).
opentelemetry_sdk = { version = "0.32", features = ["rt-tokio", "testing"] }
