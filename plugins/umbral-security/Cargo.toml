[package]
name = "umbral-security"
description = "Security headers + CSRF middleware plugin for umbral."
workspace = "../.."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
umbral = { path = "../../crates/umbral", version = "0.0.7" }
tower-http = { version = "0.6", features = ["set-header", "limit", "sensitive-headers"] }
axum = "0.8"
http = "1"
getrandom = "0.2"
hex = "0.4"
# Signed double-submit CSRF: HMAC-SHA256 over the random token (+ optional
# session-cookie binding) keyed by the app `secret_key`. Already in the
# workspace lock (umbral-auth / umbral-sessions / umbral-core use them).
hmac = "0.12"
sha2 = "0.10"
tracing = "0.1"
# Constant-time token comparison. Without this, the lexicographic
# short-circuit in String == leaks token-prefix matches over time.
# CSRF tokens aren't direct credentials, but OWASP calls for
# constant-time on all security tokens; the dep is tiny and the
# alternative (writing the byte-by-byte loop ourselves) is too easy
# to get wrong.
subtle = "2"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "sync"] }
tempfile = "3"
tower = { version = "0.5", features = ["util"] }
axum = "0.8"
http = "1"
http-body-util = "0.1"
serde_json = "1"
