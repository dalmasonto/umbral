[package]
name = "umbra-media"
description = "Media file plugin for umbra: filesystem-backed uploads + serving. S3 + image library are deferred to v0.1+."
workspace = "../../crates"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
umbra = { path = "../../crates/umbra", version = "0.0.1" }
tower-http = { version = "0.6", features = ["fs", "set-header"] }
tower = { version = "0.5", default-features = false }
tokio = { version = "1", features = ["fs", "io-util"] }
# tokio-util `io` gives StreamReader (stream -> AsyncRead, for streaming a
# body to disk) and ReaderStream (AsyncRead -> stream, for streaming a file
# off disk). futures-util provides the Stream combinators store_stream uses.
tokio-util = { version = "0.7", features = ["io"] }
futures-util = { version = "0.3", default-features = false, features = ["std"] }
bytes = "1"
axum = "0.8"
http = "1"
tracing = "0.1"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
serde = { version = "1", features = ["derive"] }
sqlx = { version = "0.8", default-features = false, features = ["sqlite", "runtime-tokio", "chrono"] }
uuid = { version = "1", features = ["v4", "serde"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "sync"] }
tempfile = "3"
tower = { version = "0.5", features = ["util"] }
