[package]
name = "umbral-auth"
description = "Authentication plugin for umbral: User model, argon2 password hashing, login helpers."
# The umbral workspace is rooted at the repo-root Cargo.toml (it spans crates/*
# and plugins/*). cargo's upward walk would reach it from here on its own; we
# still name it explicitly so membership is unambiguous and resilient.
workspace = "../.."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
# The umbral facade. Plugin crates depend on the facade only, never on
# umbral-core internals.
umbral = { path = "../../crates/umbral", version = "0.0.4" }
argon2 = { version = "0.5", features = ["std"] }
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio", "chrono"] }
# tokio's rt for spawn_blocking: the argon2 hash/verify helpers
# (hash_password_async / verify_password_async) offload their CPU-bound
# work to the blocking pool so a login burst can't starve the async
# runtime. `sync` for the Semaphore that bounds concurrent argon2 work
# (audit_2 plugin-auth #4) so a flood can't spawn thousands of 19-MiB
# hashes and OOM. The app supplies the runtime.
tokio = { version = "1", features = ["rt", "sync"] }
# clap for the `createsuperuser` management command — Plugin::commands()
# returns a Vec<Box<dyn PluginCommand>>, and each command exposes a
# clap::Command for arg parsing.
clap = "4"
# async-trait for the PluginCommand impl. The trait itself is async in
# `umbral::cli`, made object-safe via async-trait's Pin<Box<...>>
# desugaring.
async-trait = "0.1"
# rpassword for the password prompt without echo.
rpassword = "7"
# axum-core for FromRequestParts (the LoggedIn<U> extractor).
axum-core = "0.5"
# axum proper for middleware::from_fn (LoginRequiredLayer).
axum = "0.8"
# http for Parts, HeaderMap, Uri in the extractor and middleware.
http = "1"
# SHA-256 to hash session tokens before the DB lookup. Historically
# umbral-auth re-implemented this because of the now-flipped dep
# arrow; today it's a peer of the umbral-sessions implementation.
sha2 = "0.10"
# tower for the Layer + Service impl on LoginRequiredLayer so it works
# directly with Router::layer(...).
tower = "0.5"
# Cryptographic RNG + URL-safe base64 for opaque bearer-token
# generation. sha2 is already in the dep list (used by the session
# token hashing helper) and is re-used to hash the bearer key.
rand = "0.8"
base64 = "0.22"
# tracing::warn! on best-effort failures (last_login bump, etc.).
tracing = "0.1"
# umbral-sessions provides the session-table + cookie primitives.
# The dep arrow used to run sessions -> auth (sessions had user-
# aware helpers); after the de-coupling those helpers live here,
# calling into umbral-sessions for the row + cookie primitives. No
# cycle: sessions is now user-agnostic.
umbral-sessions = { path = "../umbral-sessions", version = "0.0.4" }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "sync", "time"] }
tempfile = "3"
# Test helpers for the login_required tests.
axum = "0.8"
http = "1"
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"
chrono = { version = "0.4", features = ["serde"] }
sha2 = "0.10"
uuid = { version = "1", features = ["v4"] }
