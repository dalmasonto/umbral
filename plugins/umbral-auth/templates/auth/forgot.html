{% extends "auth/base.html" %}
{% block title %}Forgot password{% endblock %}
{% block content %}
<h1>Reset your password</h1>
<form method="post">
  {{ csrf_input | safe }}
  <label>Email <input name="email" type="email" required></label>
  <button type="submit">Send reset link</button>
</form>
{% endblock %}
