[package]
name = "umbra-security"
description = "Security headers + CSRF middleware plugin for umbra."
workspace = "../../crates"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
umbra = { path = "../../crates/umbra", version = "0.0.1" }
tower-http = { version = "0.6", features = ["set-header"] }
axum = "0.8"
http = "1"
getrandom = "0.2"
hex = "0.4"
# Constant-time token comparison. Without this, the lexicographic
# short-circuit in String == leaks token-prefix matches over time.
# CSRF tokens aren't direct credentials, but OWASP calls for
# constant-time on all security tokens; the dep is tiny and the
# alternative (writing the byte-by-byte loop ourselves) is too easy
# to get wrong.
subtle = "2"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "sync"] }
tempfile = "3"
tower = { version = "0.5", features = ["util"] }
axum = "0.8"
http = "1"
http-body-util = "0.1"
