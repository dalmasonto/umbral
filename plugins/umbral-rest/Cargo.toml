[package]
name = "umbral-rest"
description = "Auto-generated JSON REST API over umbral models: serializers, viewsets, and routers."
workspace = "../.."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
umbral = { path = "../../crates/umbral", version = "0.0.1" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio", "chrono", "uuid"] }
# sea-query for the filter parser's predicate building. The ORM
# already builds on sea-query under the hood; we use the same
# primitives (Condition / SimpleExpr) to construct filter-
# style WHERE clauses that DynQuerySet::filter_condition splices in.
sea-query = "0.32"
uuid = { version = "1", features = ["serde", "v7"] }
# async-trait makes the Authentication trait object-safe (`dyn
# Authentication`). Rust's native async fn in traits doesn't yet
# work in dyn-compatible position without explicit Pin<Box<...>>
# return types; async-trait does that boxing for us so the trait
# looks clean at the call site.
async-trait = "0.1"
# Base64 decoding for the HTTP Basic Auth credential parsing in
# `auth::parse_basic_credentials`.
base64 = "0.22"
# Percent-decoding for custom-action query strings (`parse_query_string`):
# query values arrive percent-encoded (`%3A` for `:`, `+` for space), and
# action handlers want the decoded value. The standard query-string parser.
form_urlencoded = "1"
# axum 0.8 for `Router` mounting and per-method routing. Already on
# the prelude path through `umbral::web::*` but we name the crate
# directly here for `axum::routing::on` / `MethodFilter` when wiring
# `@action` endpoints.
axum = "0.8"
# `http::Method` for the `@action` registration shape — users pick
# the HTTP method as `Method::POST` etc.
http = "1"
# `?format=csv` list export (feature #61).
csv = "1"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "sync"] }
tempfile = "3"
tower = { version = "0.5", features = ["util"] }
http = "1"
http-body-util = "0.1"
axum = "0.8"
chrono = { version = "0.4", features = ["serde"] }
