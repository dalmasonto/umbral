[package]
name = "umbra-openapi"
description = "Auto-generated OpenAPI 3.0 schema + Swagger UI for umbra-rest endpoints."
workspace = "../../crates"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
umbra = { path = "../../crates/umbra", version = "0.0.1" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "sync"] }
tempfile = "3"
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio"] }
tower = { version = "0.5", features = ["util"] }
axum = "0.8"
http = "1"
http-body-util = "0.1"
umbra-rest = { path = "../umbra-rest", version = "0.0.1" }
umbra-auth = { path = "../umbra-auth", version = "0.0.1" }
chrono = { version = "0.4", features = ["serde"] }
