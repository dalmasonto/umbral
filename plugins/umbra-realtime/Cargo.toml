[package]
name = "umbra-realtime"
description = "Real-time push for umbra — SSE + WebSocket, with user- and group/room-targeted delivery over a pluggable broker."
workspace = "../../crates"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
umbra = { path = "../../crates/umbra", version = "0.0.1" }
# Identity at the SSE/WS handshake (session cookie → user id). Same
# plugin→plugin dep as umbra-oauth uses; no cycle (auth never imports us).
umbra-auth = { path = "../umbra-auth", version = "0.0.1" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# `time` carries tokio::time::sleep for the RedisBroker reconnect backoff;
# `macros` is needed for the tokio::select! in its pump loop.
tokio = { version = "1", features = ["sync", "rt", "time", "macros"] }
async-trait = "0.1"
tracing = "0.1"
# SSE + WebSocket transports.
axum = { version = "0.8", features = ["ws"] }
http = "1"
futures-core = "0.3"
# WS socket split + Sink/Stream send/recv.
futures-util = { version = "0.3", default-features = false }

[features]
# Multi-instance Redis pub/sub backplane (P6 phase 5). Off by default —
# the single-instance in-process broker needs no external service. Build
# with `--features redis` to enable `RealtimePlugin::redis(url)`.
redis = ["dep:redis"]

# Optional Redis backend dep — mirrors umbra-cache's setup (tokio-comp +
# connection-manager for transparent reconnect). Only compiled with the
# `redis` feature.
[dependencies.redis]
version = "0.27"
features = ["tokio-comp", "connection-manager"]
optional = true

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "sync", "net", "time"] }
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"
# Real WS client for the round-trip integration test.
tokio-tungstenite = "0.24"
futures-util = "0.3"
