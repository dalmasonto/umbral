[package]
name = "umbra-playground"
description = "Interactive API playground UI for umbra-rest. The DRF browsable API, in umbra."
workspace = "../../crates"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
umbra = { path = "../../crates/umbra", version = "0.0.1" }
# Dogfooded asset serving — we embed a StaticPlugin internally to
# serve the vite bundle under `<base>/assets/`. Hand-rolling the
# same code is what we used to do in src/static_serve.rs; using the
# plugin means any bug fix in umbra-static (path traversal, MIME,
# ETag, etc.) lands here for free.
umbra-static = { path = "../umbra-static", version = "0.0.1" }
axum = "0.8"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread"] }
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"
