[package]
name = "umbra-playground"
description = "Interactive API playground UI for umbra-rest. The DRF browsable API, in umbra."
workspace = "../../crates"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
umbra = { path = "../../crates/umbra", version = "0.0.1" }
# Compile-time embed of the vite-built React bundle (JS + CSS +
# Inter woff2 fonts) into the binary. The runtime serves files
# straight out of memory — no filesystem dependency. We re-export
# the embedded tree as `&'static ASSETS` and hand it to
# `StaticPlugin::embedded(...)` (umbra-static landed embedded
# source support — closing bugs/playground-openapi-gaps.md #13)
# so the playground dogfoods the framework's static-serving plugin
# *and* keeps the embed-into-binary property.
include_dir = "0.7"
# Dogfooded asset serving via StaticPlugin's embedded variant.
# Wraps include_dir for in-memory lookups + tower-http for cache
# headers + dev-mode max-age=0 + the usual Plugin trait flow.
umbra-static = { path = "../umbra-static", version = "0.0.1" }
axum = "0.8"
# `tracing::warn!` on the no-app-name fallback (gap #71).
tracing = "0.1"
# `serde_json::to_string` for safely escaping the app name into the
# inline-script `window.__UMBRA_PLAYGROUND_APP__` assignment.
serde_json = "1"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread"] }
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"
