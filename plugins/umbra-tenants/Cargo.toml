[package]
name = "umbra-tenants"
description = "Schema-per-tenant multitenancy for umbra. The django-tenants shape: one Postgres database, one schema per tenant, a shared `public` for cross-tenant apps."
workspace = "../../crates"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
umbra = { path = "../../crates/umbra", version = "0.0.1" }
serde = { version = "1", features = ["derive"] }
chrono = { version = "0.4", features = ["serde"] }
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio", "chrono"] }
# axum for the resolution middleware (wrap_router + from_fn) and the Router.
axum = "0.8"
# http for the Host header read in the resolver.
http = "1"
# clap for the `migrate_schemas` management command (Plugin::commands()).
clap = { version = "4" }
async-trait = "0.1"
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "sync", "time"] }
