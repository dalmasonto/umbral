[package]
name = "umbral-realtime"
description = "Real-time push for umbral — SSE + WebSocket, with user- and group/room-targeted delivery over a pluggable broker."
workspace = "../.."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
umbral = { path = "../../crates/umbral", version = "0.0.10" }
# umbral-auth is OPTIONAL. The base crate resolves identity through an
# injected `IdentityResolver` closure (always-None by default, so anonymous
# push-only feeds compile with zero auth deps). Wire the session-cookie
# resolver via `RealtimePlugin::with_auth_sessions()`, which requires the
# `auth` feature (and therefore this dep).
umbral-auth = { path = "../umbral-auth", version = "0.0.10", optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# `time` carries tokio::time::sleep for the RedisBroker reconnect backoff;
# `macros` is needed for the tokio::select! in its pump loop.
tokio = { version = "1", features = ["sync", "rt", "time", "macros"] }
async-trait = "0.1"
tracing = "0.1"
# SSE + WebSocket transports.
axum = { version = "0.8", features = ["ws"] }
http = "1"
futures-core = "0.3"
# WS socket split + Sink/Stream send/recv.
futures-util = { version = "0.3", default-features = false }

[features]
# Enables `RealtimePlugin::with_auth_sessions()`, which resolves the
# current user from the `umbral_auth` session cookie. Off by default so
# anonymous / push-only feeds don't pull in umbral-auth.
auth = ["dep:umbral-auth"]
# Multi-instance Redis pub/sub backplane (P6 phase 5). Off by default —
# the single-instance in-process broker needs no external service. Build
# with `--features redis` to enable `RealtimePlugin::redis(url)`.
redis = ["dep:redis"]

# Optional Redis backend dep — mirrors umbral-cache's setup (tokio-comp +
# connection-manager for transparent reconnect). Only compiled with the
# `redis` feature.
[dependencies.redis]
version = "0.27"
features = ["tokio-comp", "connection-manager"]
optional = true

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "sync", "net", "time"] }
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"
# Real WS client for the round-trip integration test.
tokio-tungstenite = "0.24"
futures-util = "0.3"
# A test model for the `expose::<T>` security suite uses `#[derive(Model)]`,
# whose expansion derives `sqlx::FromRow`. Test-only — the plugin itself
# never touches sqlx (all DB access goes through the ORM facade).
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio"] }
