# Deploy the Umbral website (umbral_website/ -> umbralrs.dev).
#
# Manual-trigger only. Three jobs:
#
#   build     compiles the release binary in rust:1-bookworm AT /app.
#   transfer  decrypts the env, stages a payload of umbral_website's files plus
#             that binary, and scp's it to the server.
#   release   ssh's in, rebuilds the image (COPY layers only) and restarts the
#             stack, then waits for the healthcheck. Fails the run if `migrate`
#             errors or `web` never turns healthy -- a deploy that silently
#             leaves a broken site is worse than one that goes red.
#
# The server COMPILES NOTHING. Its `docker compose build` is a handful of COPY
# layers (~10s) instead of 468 registry crates (~28 min cold). No image is
# published anywhere: only the binary crosses the wire, and .prod.env never
# leaves the box -- the image is assembled on the server, where the secret
# already lives.
#
# GitHub Actions is free and unlimited for public repos on standard runners, so
# the build minutes cost nothing.
#
# The `release` job brings the stack up for you. Dispatch with bring_up=false to
# transfer the files and stop there (e.g. to inspect the box before restarting).
#
# Caddy terminates TLS and proxies umbralrs.dev -> 127.0.0.1:9100 (the compose
# port is published on loopback only, so Caddy is the sole way in).
#
# Required repo secrets: AGE_PRIVATE_KEY, CONTABO_HOST, CONTABO_USER, SSH_PRIVATE_KEY.

name: deploy-website

on:
  workflow_dispatch:
    inputs:
      bring_up:
        description: "Rebuild the image and restart the stack on the server"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: deploy-website
  cancel-in-progress: false # never interrupt a transfer mid-flight

jobs:
  build:
    runs-on: ubuntu-22.04
    # Same base image as the runtime's debian:bookworm-slim -- both are Debian 12
    # (glibc 2.36, OpenSSL 3). Compiling on the bare ubuntu-22.04 runner would
    # link glibc 2.35 and only happen to run on the server.
    container: rust:1-bookworm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build deps
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends pkg-config libssl-dev

      # THE SOURCE MUST BE COMPILED AT /app.
      # Every website plugin resolves its templates with
      #   PathBuf::from(env!("CARGO_MANIFEST_DIR")).join("templates")
      # and env! freezes the builder's ABSOLUTE path into the binary. Building in
      # the runner's checkout (/__w/umbral/umbral/...) would make the binary look
      # for templates there at runtime, and every plugin page would 500 in prod
      # while the image built perfectly. The runtime image runs at /app.
      - name: Stage the source at /app
        run: |
          mkdir -p /app
          cp -a umbral_website/. /app/
          rm -rf /app/styles/node_modules   # build.rs falls back to the committed CSS
          rm -rf /app/target

      # Keyed on Cargo.lock: the 468 registry deps only recompile when a
      # dependency actually changes. 11 first-party crates rebuild every run.
      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/cargo/registry
            /usr/local/cargo/git
            /app/target
          key: umbral-website-${{ runner.os }}-${{ hashFiles('umbral_website/Cargo.lock') }}
          restore-keys: |
            umbral-website-${{ runner.os }}-

      - name: Build release binary
        working-directory: /app
        run: |
          cargo build --release --locked
          strip target/release/umbral_website
          mkdir -p "$GITHUB_WORKSPACE/dist"
          cp target/release/umbral_website "$GITHUB_WORKSPACE/dist/umbral_website"

      # Fail here rather than at the first HTTP request in production. The
      # Dockerfile repeats this assertion when it assembles the image.
      - name: Verify the binary baked /app paths
        run: |
          found=$(grep -a -o -E "/app/plugins/[a-z_]+" dist/umbral_website | sort -u | wc -l)
          echo "plugin manifest dirs resolving under /app: $found"
          grep -a -o -E "/app/plugins/[a-z_]+" dist/umbral_website | sort -u | sed 's/^/  /'
          if [ "$found" -lt 10 ]; then
            echo "::error::Binary was not compiled at /app — its templates would resolve to the build machine's paths."
            exit 1
          fi
          ls -lh dist/umbral_website
          file dist/umbral_website || true

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: umbral_website-binary
          path: dist/umbral_website
          retention-days: 3
          if-no-files-found: error

  transfer:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sops
        run: |
          curl -fLo sops https://github.com/getsops/sops/releases/download/v3.9.0/sops-v3.9.0.linux.amd64
          chmod +x sops
          sudo mv sops /usr/local/bin/sops

      - name: Set up age for decryption
        run: |
          mkdir -p ~/.config/sops/age
          echo "${{ secrets.AGE_PRIVATE_KEY }}" > ~/.config/sops/age/keys.txt

      # Stage exactly what the server needs. scp-action has no --exclude, so the
      # filtering happens here. Excluding target/ and keys.txt is not cosmetic:
      # keys.txt is the age PRIVATE key and must never leave CI.
      - name: Stage the umbral_website payload
        run: |
          rsync -a \
            --exclude='target/' \
            --exclude='styles/node_modules/' \
            --exclude='media/' \
            --exclude='design/' \
            --exclude='*.db' --exclude='*.db-shm' --exclude='*.db-wal' \
            --exclude='.env' \
            --exclude='keys.txt' \
            --exclude='secret.env' \
            umbral_website/ payload/

      - name: Download the CI-built binary
        uses: actions/download-artifact@v4
        with:
          name: umbral_website-binary
          path: payload/dist

      - name: Re-verify the binary before shipping it
        run: |
          chmod +x payload/dist/umbral_website
          found=$(grep -a -o -E "/app/plugins/[a-z_]+" payload/dist/umbral_website | sort -u | wc -l)
          if [ "$found" -lt 10 ]; then
            echo "::error::Artifact does not carry /app-rooted plugin paths; refusing to deploy."
            exit 1
          fi
          echo "binary OK ($found /app plugin dirs, $(du -h payload/dist/umbral_website | cut -f1))"

      # secret.env is committed; .prod.env is not. Decrypt into the payload so the
      # plaintext exists only inside the directory we are about to ship. The
      # Dockerfile bakes it in as /app/.env ON THE SERVER, and compose feeds the
      # same file to postgres. CI never sees a production secret in an image.
      - name: Decrypt the production env
        run: |
          test -f umbral_website/secret.env || {
            echo "::error::umbral_website/secret.env is missing. Run 'bash scripts/encrypt_envs.sh <age-public-key>' and commit it."
            exit 1
          }
          sops --decrypt umbral_website/secret.env > payload/.prod.env
          # Fail loudly rather than shipping an env that boots into a broken state.
          grep -q '^UMBRAL_BIND_ADDR=0\.0\.0\.0:' payload/.prod.env || {
            echo "::error::UMBRAL_BIND_ADDR must bind 0.0.0.0 — a loopback bind inside the container is unreachable even from its own host."
            exit 1
          }

      - name: Show what will be transferred
        run: |
          echo "Payload contents (top level):"
          ls -A payload/
          echo "Total size: $(du -sh payload/ | cut -f1)"

      - name: Transfer to Contabo
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "payload"
          strip_components: 1 # drop the leading payload/ path segment
          target: "/home/umbral_website/"
          overwrite: true

      - name: Transferred
        run: |
          echo "umbral_website + the prebuilt binary synced to /home/umbral_website."

  release:
    needs: transfer
    if: ${{ inputs.bring_up }}
    runs-on: ubuntu-22.04
    steps:
      # `docker compose build` here is only COPY layers -- the binary arrived
      # prebuilt. `up -d` runs postgres -> migrate -> web; compose fails the
      # command if `migrate` exits non-zero (service_completed_successfully),
      # which is how a bad migration turns this run red instead of quietly
      # leaving the old container serving.
      - name: Build the image and restart the stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script_stop: true # abort on the first failing command
          script: |
            set -euo pipefail
            cd /home/umbral_website

            echo "::group::docker compose build"
            docker compose build
            echo "::endgroup::"

            echo "::group::docker compose up -d"
            docker compose up -d
            echo "::endgroup::"

            # `up -d` returns as soon as the containers are created; the web
            # healthcheck (curl -H 'Host: umbralrs.dev' 127.0.0.1:9100) needs a
            # moment. Poll it rather than sleeping a guessed interval.
            cid=$(docker compose ps -q web)
            for i in $(seq 1 40); do
              status=$(docker inspect --format '{{.State.Health.Status}}' "$cid" 2>/dev/null || echo unknown)
              [ "$status" = "healthy" ] && break
              if [ "$status" = "unhealthy" ]; then break; fi
              sleep 5
            done

            echo "web health: ${status:-unknown}"
            docker compose ps

            if [ "${status:-unknown}" != "healthy" ]; then
              echo "----- migrate logs -----"; docker compose logs --no-color --tail=40 migrate || true
              echo "----- web logs -----";     docker compose logs --no-color --tail=60 web || true
              echo "web did not become healthy"
              exit 1
            fi

            echo "----- migrations applied -----"
            docker compose logs --no-color migrate 2>/dev/null | grep -iE "applied [0-9]+ migration|no pending" | tail -3 || true

      - name: Deployed
        run: |
          echo "Stack is up and healthy on 127.0.0.1:9100."
          echo "Caddy proxies umbralrs.dev -> localhost:9100."
