# release-plz configuration — https://release-plz.dev/docs/config
#
# Drives the automated, dependency-ordered publish of every umbral crate to
# crates.io. Triggered manually from .github/workflows/release-plz.yml (a
# "slow, silent" release: we dispatch it, not every push).
#
# The Cargo workspace is rooted at the repo-root `Cargo.toml` (it spans
# `crates/*` and `plugins/*`), so the action runs at the repo root with no
# manifest_path override.
#
# UNIFIED VERSIONING
# ------------------
# Every publishable crate shares ONE version number and releases in lockstep:
# the project ships as a single coherent "umbral X.Y.Z", not 27 crates drifting
# apart. release-plz has no workspace-level `shared_version` switch; the
# mechanism is `version_group` — crates sharing a group name are all assigned
# the same version (the highest next-version among the group). So every crate
# below carries `version_group = "umbral"`.
#
# WHEN YOU ADD A NEW CRATE: add it to the root `Cargo.toml` members AND add a
# `[[package]]` block here with `version_group = "umbral"`. Miss this and the new
# crate versions independently, silently breaking lockstep. Run the workflow
# once with the `dry_run` path (or `release-plz update --dry-run` locally) after
# adding crates to confirm they all resolve to the same next version.

[workspace]
# Build changelogs from conventional-commit messages (feat/fix/docs/…), which
# is exactly the commit convention this repo already follows (see CLAUDE.md).
changelog_update = true
# Cut a GitHub release + git tag when a version publishes.
git_release_enable = true
git_tag_enable = true
# Only sync workspace-internal versions into Cargo.lock; don't `cargo update`
# the entire dependency graph on every release.
dependencies_update = false

# --- FIRST-RELEASE BOOTSTRAP — RETIRED at 0.0.10 ---------------------------
# Two settings used to live here, both only meaningful while the crates were
# unpublished. Every crate has been on crates.io since 0.0.1, so both are gone:
#
#   semver_check = false     — it needs a published baseline to diff the API
#                              against, and there wasn't one. There is now (the
#                              0.0.9 tags), so the check runs and actually earns
#                              its keep: 0.0.10 changed public signatures in
#                              umbral-core (`dispatch_with_app_commands` gained a
#                              `reserved` param, `PluginCommand` gained
#                              `needs_ready`). Those are additive-or-pre-release
#                              by inspection — which is exactly the kind of claim
#                              a tool should verify rather than a human assert.
#
#   max_analyze_commits = 1  — it only applies to UNPUBLISHED packages, and it
#                              truncated the changelog to a single commit. With
#                              everything published, release-plz diffs against
#                              the per-crate tags and this does nothing but hide
#                              the other commits from the release notes.
#
# NOTE for a future NEW crate (which is, by definition, unpublished): if
# release-plz's internal `git checkout` breaks while walking back past the
# commit that moved the workspace root to the repo root (cargo rewrites the old
# crates/Cargo.lock), re-add `max_analyze_commits` FOR THAT RELEASE ONLY, then
# remove it again. Don't leave it on — it silently empties every changelog.

# --- core crates (crates/) ---
[[package]]
name = "umbral-casing"
version_group = "umbral"

[[package]]
name = "umbral-core"
version_group = "umbral"

[[package]]
