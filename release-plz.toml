# release-plz configuration — https://release-plz.dev/docs/config
#
# Drives the automated, dependency-ordered publish of every umbra crate to
# crates.io. Triggered manually from .github/workflows/release-plz.yml (a
# "slow, silent" release: we dispatch it, not every push).
#
# The Cargo workspace is rooted at the repo-root `Cargo.toml` (it spans
# `crates/*` and `plugins/*`), so the action runs at the repo root with no
# manifest_path override.
#
# UNIFIED VERSIONING
# ------------------
# Every publishable crate shares ONE version number and releases in lockstep:
# the project ships as a single coherent "umbra X.Y.Z", not 27 crates drifting
# apart. release-plz has no workspace-level `shared_version` switch; the
# mechanism is `version_group` — crates sharing a group name are all assigned
# the same version (the highest next-version among the group). So every crate
# below carries `version_group = "umbra"`.
#
# WHEN YOU ADD A NEW CRATE: add it to the root `Cargo.toml` members AND add a
# `[[package]]` block here with `version_group = "umbra"`. Miss this and the new
# crate versions independently, silently breaking lockstep. Run the workflow
# once with the `dry_run` path (or `release-plz update --dry-run` locally) after
# adding crates to confirm they all resolve to the same next version.

[workspace]
# Build changelogs from conventional-commit messages (feat/fix/docs/…), which
# is exactly the commit convention this repo already follows (see CLAUDE.md).
changelog_update = true
# Cut a GitHub release + git tag when a version publishes.
git_release_enable = true
git_tag_enable = true
# Only sync workspace-internal versions into Cargo.lock; don't `cargo update`
# the entire dependency graph on every release.
dependencies_update = false

# --- FIRST-RELEASE BOOTSTRAP (relax after the initial publish) -------------
# Nothing is on crates.io yet, so there's no baseline to diff against. These
# two settings only matter while packages are unpublished; once the first
# release tags every crate, release-plz diffs against those tags and ignores
# them. RAISE/REMOVE both after the initial publish:
#
#   semver_check        — needs a published baseline to compare the API against;
#                         with nothing published it can't run. Re-enable (drop
#                         this line, default is true) once crates are on crates.io.
#   max_analyze_commits — for UNPUBLISHED packages, release-plz walks back this
#                         many commits to build the diff/changelog. The default
#                         (1000) walks past the commit where the workspace root
#                         (and Cargo.lock) moved to the repo root; cargo rewrites
#                         that old crates/Cargo.lock and breaks release-plz's
#                         internal `git checkout`. Pinning to 1 keeps it on the
#                         post-move HEAD. Trade-off: a minimal changelog for the
#                         first 0.0.1 release. Remove this line after first publish
#                         to get full changelogs for future new crates.
semver_check = false
max_analyze_commits = 1

# --- core crates (crates/) ---
