[package]
name = "accounts"
version = "0.1.0"
edition = "2024"

[dependencies]
umbral = "0.0.7"
umbral-auth = "0.0.7"
umbral-sessions = "0.0.7"
umbral-oauth = "0.0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", default-features = false, features = ["macros", "runtime-tokio", "chrono", "uuid", "json"] }
chrono = { version = "0.4", features = ["serde"] }
http = "1"
