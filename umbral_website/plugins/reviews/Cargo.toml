[package]
name = "reviews"
version = "0.1.0"
edition = "2024"

[dependencies]
umbral = { path = "/home/dalmas/E/projects/umbral/crates/umbral" }
umbral-auth = { path = "/home/dalmas/E/projects/umbral/plugins/umbral-auth" }
accounts = { path = "../accounts" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", default-features = false, features = ["macros", "runtime-tokio", "chrono", "uuid", "json"] }
chrono = { version = "0.4", features = ["serde"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
tracing = "0.1"
