[package]
name = "plugin_directory"
version = "0.1.0"
edition = "2024"

[dependencies]
umbral = { path = "../../../crates/umbral" }
umbral-auth = { path = "../../../plugins/umbral-auth" }
# Live note feed: broadcast a posted note to the plugin's SSE watchers.
umbral-realtime = { path = "../../../plugins/umbral-realtime" }
# The global header search (/search) spans plugins + blog posts.
site_content = { path = "../../../umbral_website/plugins/site_content" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", default-features = false, features = ["macros", "runtime-tokio", "chrono", "uuid", "json"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["serde"] }

# Used by the seed-on-ready logging in src/lib.rs.
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
tracing = "0.1"
