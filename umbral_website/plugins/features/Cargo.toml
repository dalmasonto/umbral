[package]
name = "features"
version = "0.1.0"
edition = "2024"

[dependencies]
umbral = "0.0.6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", default-features = false, features = ["macros", "runtime-tokio", "chrono", "uuid", "json"] }
chrono = { version = "0.4", features = ["serde"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }  # #[tokio::test].
tracing = "0.1"
