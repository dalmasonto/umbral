[package]
name = "security_reports"
version = "0.1.0"
edition = "2024"

[dependencies]
umbral = "0.0.6"
umbral-auth = "0.0.6"
accounts = { path = "../accounts" }
plugin_directory = { path = "../plugin_directory" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", default-features = false, features = ["macros", "runtime-tokio", "chrono", "uuid", "json"] }
chrono = { version = "0.4", features = ["serde"] }
