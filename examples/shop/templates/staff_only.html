{% extends "wrapper.html" %}
{% block title %}Staff Only | Umbra Shop{% endblock %}
{% block content %}
<section class="mx-auto max-w-3xl px-4 py-16 sm:px-6 lg:px-8">
  <div class="rounded-3xl border border-emerald-200 bg-white p-8 text-center shadow-sm">
    <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-2xl bg-emerald-100 text-2xl font-black text-emerald-800">OK</div>
    <h1 class="mt-6 text-3xl font-extrabold tracking-tight text-zinc-950">Staff access confirmed</h1>
    <p class="mt-4 text-base leading-7 text-zinc-600">
      This route is protected by the <code class="rounded bg-zinc-100 px-1.5 py-0.5 text-sm text-zinc-800">ecommerce.view_product</code> permission.
    </p>
    <div class="mt-8 flex flex-col justify-center gap-3 sm:flex-row">
      <a href="/admin/" class="rounded-xl bg-zinc-950 px-5 py-3 text-sm font-semibold text-white hover:bg-zinc-800">Open admin</a>
      <a href="/dashboard" class="rounded-xl border border-zinc-200 bg-white px-5 py-3 text-sm font-semibold text-zinc-800 hover:border-zinc-300">Dashboard</a>
    </div>
  </div>
</section>
{% endblock %}
