{% extends "wrapper.html" %}
{% block title %}Page not found | Umbral Shop{% endblock %}
{% block content %}
<section class="mx-auto max-w-3xl px-4 py-20 text-center sm:px-6 lg:px-8">
  <p class="text-sm font-semibold uppercase tracking-wide text-emerald-700">404</p>
  <h1 class="mt-3 text-4xl font-extrabold tracking-tight text-zinc-950">This aisle is empty.</h1>
  <p class="mt-4 text-base leading-7 text-zinc-600">
    The path <code class="rounded bg-white px-2 py-1 text-sm text-zinc-800">{{ path }}</code> does not exist in this shop.
  </p>
  <div class="mt-8 flex flex-col justify-center gap-3 sm:flex-row">
    <a href="/" class="rounded-xl bg-zinc-950 px-5 py-3 text-sm font-semibold text-white hover:bg-zinc-800">Go home</a>
    <a href="/products" class="rounded-xl border border-zinc-200 bg-white px-5 py-3 text-sm font-semibold text-zinc-800 hover:border-zinc-300">Browse products</a>
  </div>
</section>
{% endblock %}
