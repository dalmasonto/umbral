{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
  <h1 class="text-3xl font-bold mb-2">Dashboard</h1>
  <p class="text-gray-500 mb-6">Logged in as <strong>{{ username }}</strong></p>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
    <div class="bg-white rounded shadow p-4">
      <p class="text-sm text-gray-500">Products</p>
      <p class="text-2xl font-bold">—</p>
    </div>
    <div class="bg-white rounded shadow p-4">
      <p class="text-sm text-gray-500">Orders</p>
      <p class="text-2xl font-bold">—</p>
    </div>
    <div class="bg-white rounded shadow p-4">
      <p class="text-sm text-gray-500">Revenue</p>
      <p class="text-2xl font-bold">—</p>
    </div>
  </div>

  <h2 class="text-xl font-semibold mb-3">Quick links</h2>
  <ul class="list-disc list-inside text-gray-700 space-y-1">
    <li><a href="/admin/" class="text-blue-600 hover:underline">Admin panel</a></li>
    <li><a href="/api/docs/" class="text-blue-600 hover:underline">API docs (Swagger)</a></li>
    <li><a href="/products" class="text-blue-600 hover:underline">Product catalog</a></li>
  </ul>
{% endblock %}
