[package]
name = "umbra-example-blog-plugin"
version = "0.1.0"
edition = "2024"
description = "Complete plugin showcase: BlogPlugin owns a model, routes, REST customisation, @action endpoints, and a seed-on-boot on_ready hook."
license = "MIT OR Apache-2.0"

[dependencies]
umbra = { path = "../../../crates/umbra" }
umbra-rest = { path = "../../../plugins/umbra-rest" }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio"] }
http = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
