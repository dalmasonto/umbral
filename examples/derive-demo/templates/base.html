<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}umbral derive-demo{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Opt into dark mode via the OS preference; pages look right on
    // either without extra wiring.
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          fontFamily: {
            sans: ['ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'],
            mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
          },
        },
      },
    };
  </script>
  <style>
    /* Prose tweaks that read better on both light and dark backgrounds. */
    .prose-body p { line-height: 1.7; }
    .prose-body a { text-decoration: underline; text-underline-offset: 2px; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 antialiased font-sans">
  <header class="border-b border-gray-200 dark:border-gray-800 bg-white/80 dark:bg-gray-950/80 backdrop-blur sticky top-0 z-10">
    <div class="max-w-3xl mx-auto px-6 py-4 flex items-center justify-between gap-4">
      <a href="/" class="flex items-center gap-2 text-lg font-semibold tracking-tight text-gray-900 dark:text-gray-100 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors">
        <span class="inline-flex items-center justify-center w-8 h-8 rounded-md bg-gradient-to-br from-indigo-500 to-purple-600 text-white text-sm font-bold shadow-sm">u</span>
        <span>umbral <span class="font-normal text-gray-500 dark:text-gray-400">derive-demo</span></span>
      </a>
      <nav class="flex items-center gap-1 text-sm">
        <a href="/" class="px-3 py-1.5 rounded-md text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">Home</a>
        <a href="/articles" class="px-3 py-1.5 rounded-md text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">Articles</a>
        <a href="/api/articles" class="px-3 py-1.5 rounded-md text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
          JSON
          <span class="ml-1 text-xs text-gray-400 dark:text-gray-500">/api/articles</span>
        </a>
      </nav>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-6 py-10">
    {% block content %}{% endblock %}
  </main>

  <footer class="mt-16 border-t border-gray-200 dark:border-gray-800">
    <div class="max-w-3xl mx-auto px-6 py-6 text-xs text-gray-500 dark:text-gray-400 flex flex-wrap items-center justify-between gap-2">
      <p>
        Rendered through <code class="font-mono text-gray-700 dark:text-gray-300 bg-gray-100 dark:bg-gray-800 px-1.5 py-0.5 rounded">umbral::templates</code>
        (minijinja). Source at
        <code class="font-mono text-gray-700 dark:text-gray-300 bg-gray-100 dark:bg-gray-800 px-1.5 py-0.5 rounded">examples/derive-demo/</code>.
      </p>
      <p class="text-gray-400 dark:text-gray-500">Styling: Tailwind via CDN</p>
    </div>
  </footer>
</body>
</html>
